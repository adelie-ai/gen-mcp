# Complete example: just targets with WebSocket JWT authentication
# This combines just command execution with secure WebSocket authentication

# ============================================================================
# WebSocket Authentication Configuration
# ============================================================================
[websocket_auth]
enabled = true
# IMPORTANT: Change this secret in production!
# Generate a secure secret: openssl rand -base64 32
secret = "change-me-to-a-secure-random-secret-in-production"

# Authentication behavior:
# - enabled = true: Requires valid JWT token in Authorization header
# - enabled = false: No authentication required (development only)
# - Omit section: Authentication disabled (development only)

# ============================================================================
# Just Command Tools
# ============================================================================

[groups.just]
# Timeout settings
default_timeout = 30
default_timeout_max = 600  # 10 minutes max for long builds

# Stop after (for long-running processes like watch/serve)
default_stop_after = 0  # Disabled by default
default_stop_after_max = 3600  # 1 hour max

# Termination
default_termination_signal = "SIGTERM"
default_termination_grace_period = 5

# Output limits
default_output_head_lines = 200
default_output_head_lines_max = 2000
default_output_tail_lines = 200
default_output_tail_lines_max = 2000
default_stderr_lines = 100
default_stderr_lines_max = 1000

  # Main just command - run any target
  [[groups.just.tools]]
  name = "run"
  description = "Execute a justfile target. The target name and any arguments are passed directly to just."
  command = "/usr/bin/just"
  
    [groups.just.tools.parameters.args]
    description = "Full just command line: target name and arguments, space-separated. Example: 'build --release' or 'test --verbose'"
    example = "build --release"
    required = true

  # List targets
  [[groups.just.tools]]
  name = "list"
  description = "List all available justfile targets"
  command = "/usr/bin/just"
  timeout = 5  # Quick operation
  
    [groups.just.tools.parameters.format]
    description = "Output format: 'list' for detailed list, empty for simple list"
    example = "list"
    required = false

  # Show target recipe
  [[groups.just.tools]]
  name = "show"
  description = "Show the recipe for a specific target"
  command = "/usr/bin/just"
  timeout = 5
  
    [groups.just.tools.parameters.target]
    description = "Target name to show"
    example = "build"
    required = true

  # Run in specific directory
  [[groups.just.tools]]
  name = "run_in_dir"
  description = "Run a justfile target in a specific directory (uses just's --justfile or --working-directory)"
  command = "/usr/bin/just"
  timeout = 60
  
    [groups.just.tools.parameters.dir]
    description = "Directory containing the justfile"
    example = "/path/to/project"
    required = true
    
    [groups.just.tools.parameters.args]
    description = "Target name and arguments"
    example = "build --release"
    required = true

# ============================================================================
# Example: Development vs Production Configs
# ============================================================================
# 
# Development (no auth):
#   - Omit [websocket_auth] section
#   - Or set enabled = false
#   - Run: genmcp serve --config just_with_auth.toml --mode websocket
#
# Production (with auth):
#   - Set enabled = true and provide secret
#   - Use environment variable for secret: secret = "${JWT_SECRET}"
#   - Run: genmcp serve --config just_with_auth.toml --mode websocket
#   - Or override: genmcp serve --config just_with_auth.toml --mode websocket --jwt-secret "${JWT_SECRET}"
#
# ============================================================================

