# Example genmcp configuration file
# This demonstrates configuring common Unix/shell commands

# WebSocket authentication configuration (optional)
# If omitted, authentication is disabled for WebSocket mode
# [websocket_auth]
# enabled = true  # Enable JWT authentication (default: true)
# secret = "your-secret-key-here"  # Required if enabled=true

[groups.file_operations]
default_timeout = 30
default_timeout_max = 300
default_output_head_lines = 100
default_output_tail_lines = 100
default_output_head_lines_max = 1000
default_output_tail_lines_max = 1000
default_stderr_lines = 50
default_stderr_lines_max = 500

[[groups.file_operations.tools]]
name = "mv"
description = "Move or rename files and directories by executing the Unix /bin/mv command. This changes the filesystem (may overwrite if the underlying mv is invoked with such behavior)."
command = "/bin/mv"
arg_order = ["source", "dest"]

[groups.file_operations.tools.parameters.source]
description = "Source file or directory path"
required = true

[groups.file_operations.tools.parameters.dest]
description = "Destination file or directory path"
required = true

[[groups.file_operations.tools]]
name = "cp"
description = "Copy files (and optionally directories) by executing the Unix /bin/cp command. Use the recursive flag to copy directories."
command = "/bin/cp"
# Place flags first, then positional operands (source, dest)
arg_order = ["recursive", "source", "dest"]

[groups.file_operations.tools.parameters.source]
description = "Source file or directory path"
required = true

[groups.file_operations.tools.parameters.dest]
description = "Destination file or directory path"
required = true

[groups.file_operations.tools.parameters.recursive]
description = "Copy directories recursively"
flag = "-r"
example = "true"
required = false

[[groups.file_operations.tools]]
name = "rm"
description = "Delete files (and optionally directories) by executing the Unix /bin/rm command. This is destructive and cannot be undone; use the recursive flag to remove directories."
command = "/bin/rm"
# Flags first, then the path operand
arg_order = ["recursive", "path"]

[groups.file_operations.tools.parameters.path]
description = "File or directory path to remove"
required = true

[groups.file_operations.tools.parameters.recursive]
description = "Remove directories and their contents recursively"
flag = "-r"
example = "true"
required = false

[[groups.file_operations.tools]]
name = "mkdir"
description = "Create directories by executing the Unix /bin/mkdir command. Use the parents flag to create parent directories as needed (-p)."
command = "/bin/mkdir"
arg_order = ["parents", "path"]

[groups.file_operations.tools.parameters.path]
description = "Directory path to create"
required = true

[groups.file_operations.tools.parameters.parents]
description = "Create parent directories as needed (no error if existing)"
flag = "-p"
example = "true"
required = false

[[groups.file_operations.tools]]
name = "ls"
description = "List directory contents by executing the Unix /bin/ls command. Shows files and directories in the specified path (or current directory if omitted)."
command = "/bin/ls"
arg_order = ["long", "all", "human", "recursive", "path"]

[groups.file_operations.tools.parameters.path]
description = "Directory path to list (defaults to current directory if omitted)"
required = false

[groups.file_operations.tools.parameters.long]
description = "Use long format listing"
flag = "-l"
example = "true"
required = false

[groups.file_operations.tools.parameters.all]
description = "Show all files including hidden files (starting with .)"
flag = "-a"
example = "true"
required = false

[groups.file_operations.tools.parameters.human]
description = "Use human-readable file sizes"
flag = "-h"
example = "true"
required = false

[groups.file_operations.tools.parameters.recursive]
description = "List directories recursively"
flag = "-R"
example = "true"
required = false

[[groups.file_operations.tools]]
name = "touch"
description = "Create empty files or update file timestamps by executing the Unix /usr/bin/touch command. Creates the file if it doesn't exist, or updates its access and modification times if it does."
command = "/usr/bin/touch"
arg_order = ["file"]

[groups.file_operations.tools.parameters.file]
description = "File path to create or update"
required = true

[[groups.file_operations.tools]]
name = "pwd"
description = "Print the current working directory by executing the Unix /bin/pwd command. Returns the absolute path of the current directory."
command = "/bin/pwd"
arg_order = []

[[groups.file_operations.tools]]
name = "bash"
description = "Execute a bash command by running /bin/bash with the -c flag. The command string will be interpreted by bash, allowing use of shell features like pipes, redirects, and variables. Use with caution as this allows shell interpretation."
command = "/bin/bash"
arg_order = ["command"]

[groups.file_operations.tools.parameters.command]
description = "Bash command to execute (will be passed to bash -c)"
required = true
flag = "-c"
takes_value = true

[[groups.file_operations.tools]]
name = "write_file"
description = "Create or overwrite a text file with the given contents. Uses bash with printf to safely write content to a file, handling special characters correctly. Provide the command as: printf '%s' 'content' > 'file' where content is the text to write and file is the target file path."
command = "/bin/bash"
arg_order = ["command"]

[groups.file_operations.tools.parameters.command]
description = "Bash command to write file. Format: printf '%s' 'content' > 'file'. Example: printf '%s' 'Hello World' > /tmp/test.txt"
required = true
flag = "-c"
takes_value = true

[groups.text_processing]
default_timeout = 60
default_timeout_max = 600
default_output_head_lines = 200
default_output_tail_lines = 200
default_output_head_lines_max = 2000
default_output_tail_lines_max = 2000

[[groups.text_processing.tools]]
name = "cat"
description = "Display file contents by executing the Unix /bin/cat command. Can concatenate multiple files or display a single file."
command = "/bin/cat"
arg_order = ["file"]

[groups.text_processing.tools.parameters.file]
description = "File to display"
required = true

[[groups.text_processing.tools]]
name = "echo"
description = "Output text by executing the Unix /bin/echo command. Useful for generating text output or testing."
command = "/bin/echo"
arg_order = ["text"]

[groups.text_processing.tools.parameters.text]
description = "Text to output"
required = true

[[groups.text_processing.tools]]
name = "grep"
description = "Search for text patterns by executing the Unix /bin/grep command. Provide a pattern and a file or directory; use recursive to search directories."
command = "/bin/grep"
timeout = 120
timeout_max = 600
arg_order = ["recursive", "pattern", "file"]

[groups.text_processing.tools.parameters.pattern]
description = "Pattern to search for"
required = true

[groups.text_processing.tools.parameters.file]
description = "File to search in"
required = true

[groups.text_processing.tools.parameters.recursive]
description = "Search recursively in directories"
flag = "-r"
example = "true"
required = false

[[groups.text_processing.tools]]
name = "rg"
description = "Fast text search by executing the Unix ripgrep CLI (rg) from PATH. Provide a pattern and a file/directory path; returns matching lines. Prefer this to grep when rg has required functionality."
command = "rg"
timeout = 120
timeout_max = 600
arg_order = ["pattern", "path"]

[groups.text_processing.tools.parameters.pattern]
description = "Pattern to search for"
required = true

[groups.text_processing.tools.parameters.path]
description = "File or directory to search in"
required = true

[[groups.text_processing.tools]]
name = "sed"
description = "Apply text transformations by executing the Unix /bin/sed stream editor on an input file. The script argument is passed directly to sed. Use in_place to modify the file directly instead of outputting to stdout."
command = "/bin/sed"
arg_order = ["in_place", "script", "file"]

[groups.text_processing.tools.parameters.script]
description = "Sed script/command"
required = true

[groups.text_processing.tools.parameters.file]
description = "Input file"
required = true

[groups.text_processing.tools.parameters.in_place]
description = "Edit file in place (modifies the file directly instead of outputting to stdout)"
flag = "-i"
example = "true"
required = false

[[groups.text_processing.tools]]
name = "awk"
description = "Process structured text by executing the Unix /usr/bin/awk interpreter. The program argument is the awk script; file is optional (stdin if omitted)."
command = "/usr/bin/awk"
arg_order = ["program", "file"]

[groups.text_processing.tools.parameters.program]
description = "AWK program/script"
required = true

[groups.text_processing.tools.parameters.file]
description = "Input file"
required = false

[[groups.text_processing.tools]]
name = "wc"
description = "Count lines/words/bytes by executing the Unix /usr/bin/wc command on a file. Use the lines/words flags to request specific counts."
command = "/usr/bin/wc"
output_head_lines = 10
output_tail_lines = 10
arg_order = ["lines", "words", "file"]

[groups.text_processing.tools.parameters.file]
description = "File to count"
required = true

[groups.text_processing.tools.parameters.lines]
description = "Count lines only"
flag = "-l"
example = "true"
required = false

[groups.text_processing.tools.parameters.words]
description = "Count words only"
flag = "-w"
example = "true"
required = false

[[groups.text_processing.tools]]
name = "diff"
description = "Compare files and show differences by executing the Unix /usr/bin/diff command. Shows line-by-line differences between two files."
command = "/usr/bin/diff"
arg_order = ["file1", "file2"]

[groups.text_processing.tools.parameters.file1]
description = "First file to compare"
required = true

[groups.text_processing.tools.parameters.file2]
description = "Second file to compare"
required = true

[[groups.text_processing.tools]]
name = "patch"
description = "Apply patch files by executing the Unix /usr/bin/patch command. Applies a patch file to modify an existing file."
command = "/usr/bin/patch"
arg_order = ["file", "patch_file"]

[groups.text_processing.tools.parameters.file]
description = "File to patch"
required = true

[groups.text_processing.tools.parameters.patch_file]
description = "Patch file to apply"
required = true

[groups.file_search]
default_timeout = 300
default_timeout_max = 1800
default_output_head_lines = 500
default_output_tail_lines = 500
default_output_head_lines_max = 5000
default_output_tail_lines_max = 5000

[[groups.file_search.tools]]
name = "find"
description = "Search the filesystem by executing the Unix /usr/bin/find command. Provide a starting path and optional -name pattern and -type filter."
command = "/usr/bin/find"
timeout = 600
timeout_max = 3600
# `find <path> -name <pattern> -type <f|d>`
arg_order = ["path", "name", "type"]

[groups.file_search.tools.parameters.path]
description = "Starting directory path"
required = true

[groups.file_search.tools.parameters.name]
description = "Search by filename pattern"
flag = "-name"
takes_value = true
required = false

[groups.file_search.tools.parameters.type]
description = "Search by file type (f=file, d=directory)"
flag = "-type"
takes_value = true
required = false

[[groups.file_search.tools]]
name = "fd"
description = "Search for files by executing the Unix fd CLI from PATH (a faster, user-friendly alternative to find). Provide a pattern and optional starting directory."
command = "fd"
timeout = 300
timeout_max = 1800
arg_order = ["pattern", "path"]

[groups.file_search.tools.parameters.pattern]
description = "Search pattern"
required = true

[groups.file_search.tools.parameters.path]
description = "Starting directory path"
required = false

[groups.monitoring]
default_timeout = 0
default_timeout_max = 3600
default_stop_after = 20
default_stop_after_max = 3600
default_termination_signal = "SIGINT"

[[groups.monitoring.tools]]
name = "tail"
description = "View the end of a file by executing the Unix /usr/bin/tail command. Use follow to stream updates (-f) and lines to control how many lines are shown (-n)."
command = "/usr/bin/tail"
stop_after = 30
stop_after_max = 3600
# Options first, then the file operand
arg_order = ["follow", "lines", "file"]

[groups.monitoring.tools.parameters.file]
description = "File to tail"
required = true

[groups.monitoring.tools.parameters.follow]
description = "Follow file changes (like tail -f)"
flag = "-f"
example = "true"
required = false

[groups.monitoring.tools.parameters.lines]
description = "Number of lines to display"
flag = "-n"
takes_value = true
example = "50"
required = false
